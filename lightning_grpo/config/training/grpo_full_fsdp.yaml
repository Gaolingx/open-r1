task: grpo
seed: 42
output_dir: outputs/lightning_grpo_demo

precision:
  parameter_dtype: bf16
  trainer_precision: bf16-mixed

model:
  model_name_or_path: Qwen/Qwen3.5-0.8B
  attn_implementation: sdpa
  gradient_checkpointing: true
  use_cache: false

data:
  dataset_name: open-r1/OpenR1-Math-220k
  train_split: train
  prompt_column: problem
  response_column: solution
  max_seq_length: 2048
  num_workers: 4
  preprocessing_batch_size: 128
  preprocessing_use_cache: false
  preprocessing_keep_in_memory: true

optimization:
  optimizer:
    type: adamw
    learning_rate: 1.0e-6
    weight_decay: 0.0
  scheduler:
    type: cosine
    warmup_steps: 50
  max_epochs: 1
  gradient_accumulation_steps: 4
  gradient_clip_val: 1.0
  train_micro_batch_size: 1
  eval_micro_batch_size: 1

reward:
  reward_funcs: [accuracy, format, tag_count]
  cosine_min_value_wrong: 0.0
  cosine_max_value_wrong: -0.5
  cosine_min_value_correct: 0.5
  cosine_max_value_correct: 1.0
  cosine_max_len: 1000

rollout:
  num_generations: 4
  max_prompt_length: 1024
  generation_config_path: lightning_grpo/config/generation/generation_config.json
  kl_beta: 0.04
  loss_type: grpo
  epsilon: 0.2
  epsilon_high: 5.0
  use_reference_model: true
  engine:
    engine_type: policy
    request_timeout: 120
  debug:
    enabled: false
    every_n_steps: 50
    questions:
      - If x + 4 = 10, what is x?
    generation_config_path: lightning_grpo/config/generation/generation_config.json

logging:
  project: open-r1-lightning
  run_name: grpo-demo
  enable_csv: true
  enable_wandb: false
  log_every_n_steps: 5

checkpoint:
  dirpath: outputs/lightning_grpo_demo/checkpoints
  monitor: train/reward
  mode: max
  save_top_k: 2
  save_last: true
  every_n_train_steps: 100

distributed:
  strategy: fsdp
  accelerator: gpu
  devices: 8
  num_nodes: 1
  fsdp_activation_checkpointing: true
  fsdp_sharding_strategy: FULL_SHARD
