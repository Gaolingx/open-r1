task: grpo
seed: 42
output_dir: outputs/lightning_grpo_qwen3_1_7b_rank0

liger_kernel:
  enabled: true
  compiled: true

precision:
  model_param_dtype: bf16
  trainer_precision: bf16-true

model:
  model_name_or_path: Qwen/Qwen3-1.7B
  trust_remote_code: true
  attn_implementation: sdpa
  gradient_checkpointing: true
  use_cache: false
  lora:
    enabled: true
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]

# GRPO rollout / loss hyperparameters
rollout:
  num_generations: 4
  max_prompt_length: 1024
  max_completion_length: 768
  max_total_length: 2048
  temperature: 0.8
  top_p: 0.95
  kl_beta: 0.1
  loss_type: cispo
  epsilon: 0.2
  epsilon_high: 5.0
  advantage_epsilon: 1.0e-4
  use_reference_model: true
  debug_samples: false
  debug_every_n_steps: 20

reward:
  reward_funcs: [accuracy, format, tag_count]
  cosine_min_value_wrong: 0.0
  cosine_max_value_wrong: -0.5
  cosine_min_value_correct: 0.5
  cosine_max_value_correct: 1.0
  cosine_max_len: 1000

data:
  dataset_list:
    - id: json
      split: train
      data_files:
        train:
          - E:/training/datasets/minimind_dataset/rlaif.jsonl
    - id: json
      split: test
      data_files:
        test:
          - E:/training/datasets/minimind_dataset/rlaif.jsonl
  train_split: train
  val_split: test
  prompt_column: prompt
  response_column: response
  messages_column: conversations
  tools_column: tools
  add_generation_prompt: true
  add_system_ratio: 0.0
  thinking_ratio: 0.9
  max_seq_length: 2048
  num_workers: 0
  streaming: true
  preprocessing_batch_size: 64
  preprocessing_use_cache: true
  preprocessing_keep_in_memory: false

optimization:
  optimizer:
    type: adamw
    learning_rate: 1.0e-6
    betas: [0.9, 0.95]
    weight_decay: 0.01
  scheduler:
    type: cosine_with_min_lr
    warmup_steps: 50
    scheduler_specific_kwargs:
      min_lr_rate: 0.01
  max_epochs: 1
  gradient_accumulation_steps: 8
  gradient_clip_val: 1.0
  train_micro_batch_size: 1
  eval_micro_batch_size: 1

logging:
  project: open-r1-lightning
  run_name: grpo-lora-qwen3-1.7b-rank0
  enable_csv: false
  enable_wandb: true
  log_every_n_steps: 5

checkpoint:
  dirpath: outputs/lightning_grpo_qwen3_1_7b_rank0/checkpoints
  monitor: train/loss
  mode: min
  save_top_k: 2
  save_last: true
  every_n_train_steps: 500

distributed:
  strategy: auto
  accelerator: gpu
  devices: 1
  num_nodes: 1
  sync_batchnorm: false
