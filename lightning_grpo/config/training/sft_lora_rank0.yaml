task: sft
seed: 42
output_dir: outputs/lightning_sft_demo

precision:
  model_param_dtype: bf16
  trainer_precision: bf16-mixed

model:
  model_name_or_path: Qwen/Qwen3-1.7B
  attn_implementation: sdpa
  gradient_checkpointing: true
  use_cache: false
  lora:
    enabled: true
    r: 64
    alpha: 128
    dropout: 0.05
    target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]

data:
  dataset_name: open-r1/Mixture-of-Thoughts
  dataset_config: all
  train_split: train
  val_split: test
  prompt_column: prompt
  response_column: response
  max_seq_length: 2048
  num_workers: 4
  preprocessing_batch_size: 128
  preprocessing_use_cache: true
  preprocessing_keep_in_memory: false
  completion_only_loss: false
  assistant_only_loss: true

optimization:
  optimizer:
    type: adamw
    learning_rate: 2.0e-5
    betas: [0.9, 0.95]
    weight_decay: 0.01
  scheduler:
    type: cosine_with_min_lr
    warmup_steps: 100
    scheduler_specific_kwargs:
      min_lr_rate: 0.01
  max_epochs: 1
  gradient_accumulation_steps: 4
  gradient_clip_val: 1.0
  train_micro_batch_size: 8
  eval_micro_batch_size: 1

logging:
  project: open-r1-lightning
  run_name: sft-demo
  enable_csv: true
  enable_wandb: false
  log_every_n_steps: 10
  sample_every_n_steps: 200
  sample_prompts:
    - "Solve: What is 12 * 13?"
    - "Explain why the derivative of x^2 is 2x."

checkpoint:
  dirpath: outputs/lightning_sft_demo/checkpoints
  monitor: val/loss
  mode: min
  save_top_k: 2
  save_last: true
  every_n_train_steps: 200

distributed:
  strategy: auto
  accelerator: gpu
  devices: 1
  num_nodes: 1
  sync_batchnorm: false
