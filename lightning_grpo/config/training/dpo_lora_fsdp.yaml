task: dpo
seed: 42
output_dir: outputs/lightning_dpo_demo

liger_kernel:
  enabled: true

precision:
  model_param_dtype: bf16
  trainer_precision: bf16-mixed

model:
  model_name_or_path: Qwen/Qwen3-1.7B
  attn_implementation: sdpa
  gradient_checkpointing: true
  use_cache: false
  lora:
    enabled: true
    r: 64
    alpha: 128
    dropout: 0.05
    target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]

# DPO hyperparameters
beta: 0.1
loss_type: sigmoid
nll_coeff: 0.1

data:
  dataset_name: trl-lib/ultrafeedback_binarized
  train_split: train
  val_split: test
  prompt_column: prompt
  chosen_column: chosen
  rejected_column: rejected
  max_seq_length: 2048
  num_workers: 4
  preprocessing_batch_size: 128
  preprocessing_use_cache: true
  preprocessing_keep_in_memory: false

optimization:
  optimizer:
    type: adamw
    learning_rate: 5.0e-6
    betas: [0.9, 0.95]
    weight_decay: 0.01
  scheduler:
    type: cosine_with_min_lr
    warmup_steps: 50
    scheduler_specific_kwargs:
      min_lr_rate: 0.01
  max_epochs: 1
  gradient_accumulation_steps: 4
  gradient_clip_val: 1.0
  train_micro_batch_size: 4
  eval_micro_batch_size: 1

logging:
  project: open-r1-lightning
  run_name: dpo-lora-fsdp
  enable_csv: true
  enable_wandb: false
  log_every_n_steps: 10

checkpoint:
  dirpath: outputs/lightning_dpo_demo/checkpoints
  monitor: train/loss
  mode: min
  save_top_k: 2
  save_last: true
  every_n_train_steps: 200

distributed:
  strategy: fsdp2
  accelerator: gpu
  devices: 8
  num_nodes: 1
  sync_batchnorm: false
