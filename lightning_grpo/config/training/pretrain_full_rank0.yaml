task: pretrain
seed: 42
output_dir: outputs/lightning_pretrain_demo

precision:
  parameter_dtype: bf16
  trainer_precision: bf16-mixed

model:
  model_family: minimind
  model_name_or_path: MiniMind
  tokenizer_name_or_path: lightning_grpo/module/minimind/tokenizer
  model_config_path: lightning_grpo/config/model/model_config.json
  pretrained_weight: none
  custom_weight_dir: outputs
  gradient_checkpointing: true
  use_cache: false
  lora:
    enabled: false
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules: [q_proj, k_proj, v_proj, o_proj]

data:
  train_files:
    - E:/training/t2t/pretrain/pretrain_t2t.jsonl
  text_column: text
  train_split: train
  max_seq_length: 1024
  num_workers: 0
  preprocessing_batch_size: 128
  preprocessing_use_cache: true
  preprocessing_keep_in_memory: false

optimization:
  optimizer:
    type: adamw8bit
    learning_rate: 1.0e-4
    weight_decay: 0.01
  scheduler:
    type: cosine
    warmup_steps: 100
  max_epochs: 2
  gradient_accumulation_steps: 1
  gradient_clip_val: 1.0
  train_micro_batch_size: 16
  eval_micro_batch_size: 1

logging:
  project: open-r1-lightning
  run_name: pretrain-demo
  enable_csv: false
  enable_wandb: true
  log_every_n_steps: 5
  sample_every_n_steps: 0
  sample_prompts: []

checkpoint:
  dirpath: outputs/lightning_pretrain_demo/checkpoints
  monitor: train/loss_step
  mode: min
  save_top_k: 2
  save_last: true
  every_n_train_steps: 1000

distributed:
  strategy: auto
  accelerator: gpu
  devices: 1
  num_nodes: 1
  sync_batchnorm: false