# GRPO training with vLLM rollout engine (server mode)
# This config demonstrates multi-node vLLM RL rollout with tool calling and Liger Kernel.
#
# Usage:
#   1. Start vLLM server on inference nodes:
#      vllm serve Qwen/Qwen2.5-7B-Instruct --port 8000
#
#   2. Launch training:
#      python lightning_grpo/scripts/train_grpo.py --config recipes/Qwen2.5-7B-Instruct/grpo/grpo_vllm.yaml

task: grpo
seed: 42
output_dir: outputs/grpo_vllm_demo

# Top-level Liger Kernel toggle (convenience alias)
use_liger_kernel: true

system_prompt: "You are a helpful assistant that can use tools to solve problems."

model:
  model_name_or_path: Qwen/Qwen2.5-7B-Instruct
  trust_remote_code: true
  attn_implementation: flash_attention_2

precision:
  precision: bf16
  fsdp_param_dtype: bf16
  fsdp_reduce_dtype: bf16

distributed:
  strategy: fsdp2
  devices: 4
  tensor_parallel:
    enabled: false

optimization:
  optimizer:
    type: AdamW
    learning_rate: 5.0e-7
    betas: [0.9, 0.999]
    weight_decay: 0.01
  scheduler:
    type: cosine
    warmup_steps: 50
  max_steps: 1000
  gradient_accumulation_steps: 4
  gradient_clip_val: 1.0

data:
  dataset_name: trl-lib/DeepMath-103K
  split: train
  max_samples: 10000

reward:
  training_paradigm: rlvr
  rlvr:
    reward_funcs:
      - accuracy
      - format
    reward_weights: [0.7, 0.3]

rollout:
  num_generations: 8
  num_generations_eval: 4
  max_prompt_length: 2048
  max_completion_length: 8192
  temperature: 0.7
  kl_beta: 0.04
  epsilon: 0.2
  epsilon_high: 5.0
  loss_type: grpo
  use_reference_model: true
  generation_batch_size: 4

  # vLLM rollout engine configuration
  engine:
    engine_type: vllm
    vllm:
      mode: server  # "server" for multi-node, "colocate" for single-node
      # Server mode settings
      server_base_url: "http://localhost:8000"
      server_timeout: 240.0
      group_port: 51216
      # Colocate mode settings (used when mode=colocate)
      tensor_parallel_size: 1
      gpu_memory_utilization: 0.9
      enable_sleep_mode: true
      model_impl: auto
      # Generation overrides
      repetition_penalty: 1.0
      logprobs: 0

  # Tool calling configuration
  tool_calling:
    enabled: true
    max_iterations: 3
    tools:
      - my_project.tools.calculator
      - my_project.tools.web_search

  debug:
    enabled: true
    every_n_steps: 100
    questions:
      - "What is 2 + 2?"
      - "Solve: x^2 - 5x + 6 = 0"

checkpoint:
  dirpath: outputs/grpo_vllm_demo/checkpoints
  save_top_k: 3
  monitor: val/reward
  mode: max
  every_n_train_steps: 200
